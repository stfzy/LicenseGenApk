name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Add Capacitor Android platform
        run: npx cap add android || echo "already exists"

      - name: Capacitor copy
        run: npx cap copy android

      - name: Create MainActivity
        run: |
          mkdir -p android/app/src/main/java/com/authtool/app
          cat > android/app/src/main/java/com/authtool/app/MainActivity.java << 'EOF'
          package com.authtool.app;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.widget.Toast;
          import android.util.Base64;
          import androidx.activity.result.ActivityResultLauncher;
          import androidx.activity.result.contract.ActivityResultContracts;
          import com.getcapacitor.BridgeActivity;
          import java.io.OutputStream;

          public class MainActivity extends BridgeActivity {

              private byte[] pendingData;
              private ActivityResultLauncher<Intent> createFileLauncher;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  createFileLauncher = registerForActivityResult(
                      new ActivityResultContracts.StartActivityForResult(),
                      result -> {
                          if (result.getResultCode() == Activity.RESULT_OK && result.getData() != null) {
                              Uri uri = result.getData().getData();
                              try {
                                  OutputStream os = getContentResolver().openOutputStream(uri);
                                  os.write(pendingData);
                                  os.close();
                                  Toast.makeText(this, "文件已保存", Toast.LENGTH_SHORT).show();
                              } catch (Exception e) {
                                  Toast.makeText(this, "保存失败: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                              }
                          }
                          pendingData = null;
                      }
                  );

                  WebView webView = getBridge().getWebView();
                  webView.setDownloadListener((url, userAgent, contentDisposition, mimeType, contentLength) -> {
                      if (url.startsWith("data:")) {
                          String base64 = url.substring(url.indexOf(",") + 1);
                          pendingData = Base64.decode(base64, Base64.DEFAULT);
                          Intent intent = new Intent(Intent.ACTION_CREATE_DOCUMENT);
                          intent.addCategory(Intent.CATEGORY_OPENABLE);
                          intent.setType("application/octet-stream");
                          intent.putExtra(Intent.EXTRA_TITLE, "license.license");
                          createFileLauncher.launch(intent);
                      }
                  });
              }
          }
          EOF

      - name: Patch AndroidManifest
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />|' \
          android/app/src/main/AndroidManifest.xml

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
